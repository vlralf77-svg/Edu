# Capacitor 안드로이드 디버그 APK를 빌드해 아티팩트로 업로드하는 워크플로.
# GitHub 러너는 Google Maven/Android SDK 접근이 가능하므로 여기서 APK를 생성한다.
name: Build Android APK

on:
  # Actions 탭에서 수동 실행
  workflow_dispatch:
    inputs:
      build_type:
        description: "빌드 타입"
        type: choice
        default: debug
        options:
          - debug
          - release
  # v* 태그 푸시 시 자동 빌드
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Build web assets (Vite)
        run: npm run build

      - name: Capacitor sync (Android)
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          if [ "${{ github.event.inputs.build_type }}" = "release" ]; then
            ./gradlew assembleRelease --no-daemon --stacktrace
          else
            ./gradlew assembleDebug --no-daemon --stacktrace
          fi

      - name: Locate APK
        id: apk
        run: |
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -n 1)
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "Built APK: $APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tinylearn-apk
          path: android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 30

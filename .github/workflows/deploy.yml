# Vite(React) 정적 사이트를 GitHub Pages로 빌드·배포하는 워크플로
name: Deploy to GitHub Pages

on:
  # 기본 브랜치에 push 시 실행
  push:
    branches: ["main"]
  # Actions 탭에서 수동 실행 허용
  workflow_dispatch:

# GITHUB_TOKEN 권한: Pages 배포 허용
permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 1개만 허용 (진행 중 배포는 취소하지 않음)
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Install dependencies
        run: npm ci
      - name: Build (Vite)
        run: npm run build
        env:
          GH_PAGES: "true"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
